name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  # ── GCP settings — set these in GitHub repo variables (not secrets) ──
  GCP_PROJECT_ID:  ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION:      ${{ vars.GCP_REGION || 'us-central1' }}
  GKE_CLUSTER:     ${{ vars.GKE_CLUSTER || 'rag-cluster' }}
  AR_REPO:         ${{ vars.AR_REPO || 'rag-repo' }}
  IMAGE_NAME:      rag-api

jobs:

  # ── Lint ────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/


  # ── Test ────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER:     rag
          POSTGRES_PASSWORD: rag_secret
          POSTGRES_DB:       rag_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U rag -d rag_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGVECTOR_CONNECTION_STRING: postgresql+psycopg://rag:rag_secret@localhost:5432/rag_db
      GROQ_API_KEY:  ${{ secrets.GROQ_API_KEY }}
      GROQ_MODEL:    llama3-8b-8192
      EMBED_MODEL:   BAAI/bge-small-en-v1.5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt pytest pytest-asyncio httpx
      - run: psql postgresql://rag:rag_secret@localhost:5432/rag_db -f init.sql
      - run: pytest tests/ -v --tb=short


  # ── Build & Push to Artifact Registry ───────────────────────────────
  build:
    name: Build & push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      image: ${{ steps.image.outputs.image }}

    permissions:
      contents: read
      id-token: write    # needed for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      # Authenticate to GCP via Workload Identity Federation (keyless)
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Set image tag
        id: image
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}"
          TAG="${IMAGE}:sha-${{ github.sha }}"
          LATEST="${IMAGE}:latest"
          echo "image=${TAG}" >> "$GITHUB_OUTPUT"
          echo "TAG=${TAG}" >> "$GITHUB_ENV"
          echo "LATEST=${LATEST}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push:    true
          tags:    ${{ env.TAG }},${{ env.LATEST }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          build-args: |
            EMBED_MODEL=BAAI/bge-small-en-v1.5
            RERANKER_MODEL=cross-encoder/ms-marco-MiniLM-L-6-v2


  # ── Deploy to GKE ────────────────────────────────────────────────────
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location:     ${{ env.GCP_REGION }}

      - name: Apply Kubernetes manifests
        run: |
          # Substitute placeholders with real values
          sed -i "s|PROJECT_ID|${{ env.GCP_PROJECT_ID }}|g" k8s/*.yaml
          sed -i "s|REGION|${{ env.GCP_REGION }}|g"         k8s/*.yaml
          kubectl apply -f k8s/

      - name: Update deployment image
        run: |
          kubectl set image deployment/rag-api \
            rag-api="${{ needs.build.outputs.image }}" \
            --namespace=rag

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/rag-api \
            --namespace=rag \
            --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods -n rag
          echo "Deployed image: ${{ needs.build.outputs.image }}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deployment failed — rolling back..."
          kubectl rollout undo deployment/rag-api --namespace=rag
